<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us Page - Paraiso Chamber of Commerce </title>

    <meta name="description"
        content="Chamber home page is where some information about my city's commerces is displayed, a menu for other pages.">
    <meta name="author" content="Ryan Morales | WDD 231">
    <!--FavIcon-->
    <link rel="icon" href="images/favicon.ico">

    <!--Social Media meta tags-->
    <!--title-->
    <meta property="og:title" content="Ryan Morales | WDD231 Paraiso Chamber Page">
    <!--description-->
    <meta property="og:description"
        content="Paraiso Chamber of Commerce website is a page dedicated to honor local businesses and promote community engagement.">
    <!--image-->
    <meta property="og:image" content="https://moralesryan.github.io/wdd231/chamber/images/og-image.jpg">
    <!--url-->
    <meta property="og:url" content="https://moralesryan.github.io/wdd231/chamber/directory.html">
    <!--type-->
    <meta property="og:type" content="website">
    <!--link to JS and CSS-->
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/last-modified.js" defer></script>
    <script src="scripts/timestamp.js" defer></script>
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/base.css">

    <!--Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

</head>

<body>
    <header>
        <img src="images/logo.svg" alt="Paraiso logo">
        <span>Paraiso Chamber of Commerce</span>
        <button id="ham-btn" class="hamburger" aria-label="Open navigation menu"></button>
    </header>
    <nav id="nav-bar" class="navigation">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="directory.html">Directory</a></li>
            <li class="current"><a href="join.html">Join</a></li>
            <li><a href="#">Discover</a></li>
        </ul>

    </nav>
    <main>
        <h1>Join Us Now!</h1>
        <div class="layout">
            <section class="form-section">
                <form class="sign-up" method="get" action="thankyou.html">
                    <!--First Name-->
                    <label for="name">First Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter name" required title="Enter your name"
                        autocomplete="given-name">
                    <!--Last Name-->
                    <label for="lname">Last Name</label>
                    <input type=text id="lname" name="last-name" placeholder="Enter last name" required
                        title="Enter your last name" autocomplete="family-name">
                    <!--Title-->
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" placeholder="Enter title"
                        title="Minimum 7 alpha characters, no special characters, no numbers.s"
                        autocomplete="organization-title" pattern="[A-Za-z\s-]{7,}">
                    <!--Email Address-->
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required name="email" placeholder="user@example.com"
                        autocomplete="email" title="Enter your email">
                    <!--Phone number-->
                    <label for="number">Phone number</label>
                    <input type="tel" id="number" required name="phone number" placeholder="+1(555)123-4567"
                        title="Enter your phone number" autocomplete="tel">
                    <!--Org Name-->
                    <label for="org-name">Business/Organization name</label>
                    <input type="text" id="org-name" required name="business/organization name"
                        title="Enter your business/organization name" placeholder="Organization name"
                        autocomplete="organization">
                    <!--Membership lvl-->
                    <label for="membershiplvl">Select your membership level</label>
                    <select name="membership level" id="membershiplvl">
                        <option value="np-membership">NP Membership</option>
                        <option value="bronze">Bronze Membership</option>
                        <option value="silver">Silver Membership</option>
                        <option value="gold">Gold Membership</option>
                    </select>
                    <!--Org Description-->
                    <label for="description">Organization's description</label>
                    <textarea id="description" name="description" title="Enter your business/organization's description"
                        placeholder="Enter your organization's description here."></textarea>
                    <!--Time Stamp-->
                    <input type="hidden" id="timestamp" name="timestamp">
                    <!--Button!-->
                    <input class="submit-button" type="submit" value="Submit Form">
                </form>
            </section>

            <section class="mcards">
                <div id="membership-cards"></div>
            </section>

        </div>

        <section class="memblvl-cards">
            <dialog id="np-memb">
                <h2>Non-Profit Membership</h2>
                <button id="closeNp">Close</button>
            </dialog>

            <dialog id="bronze-memb">
                <h2>Bronze Membership</h2>
                <button id="closeBronze">Close</button>
            </dialog>

            <dialog id="silver-memb">
                <h2>Silver Membership</h2>
                <button id="closeSilver">Close</button>
            </dialog>

            <dialog id="gold-memb">
                <h2>Gold Membership</h2>
                <button id="closeGold">Close</button>
            </dialog>
        </section>
    </main>
    <footer>
        <div class="contact-info">

        </div>
        <div class="social">
            <a href="#"><img src="images/discord.svg" alt="Discord logo" width="16" height="16"></a>
            <a href="#"><img src="images/github.svg" alt="GitHub logo" width="16" height="16"></a>
            <a href="#"><img src="images/linkedin.svg" alt="LinkedIn logo" width="16" height="16"></a>
            <a href="#"><img src="images/pinterest.svg" alt="Pinterest logo" width="16" height="16"></a>
        </div>
        <div class="wdd-info">
            <span>WDD 231 Class Project</span>
            <span>Ryan Morales</span>
            <span id="currentDates"></span>
            <span id="lastModified"></span>
        </div>
    </footer>
</body>

</html>
